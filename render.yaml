services:
  - type: web
    name: intelli-credit-api
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ENCRYPTED_SECRET
        sync: false
      - key: AES_ENCRYPTION_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ENV
        value: production
