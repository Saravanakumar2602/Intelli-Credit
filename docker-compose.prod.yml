services:
  backend:
    image: ghcr.io/saravanakumar2602/intelli-credit-backend:latest
    container_name: intelli_credit_backend

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - /home/ubuntu/uploads:/app/uploads

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
